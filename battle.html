<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Battle Arena</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e293b;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .battle-container {
            width: 800px;
            height: 520px; /* Slightly taller to accommodate the new UI panel */
            background: linear-gradient(to bottom, #7dd3fc, #e0f2fe, #dcfce7, #86efac); 
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border: 4px solid #334155;
            display: none; 
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .setup-box {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #475569;
            width: 320px;
            text-align: center;
        }

        .input-field {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 1em;
            text-align: center;
        }

        .radio-group {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
        }

        .start-btn {
            width: 100%;
            padding: 12px;
            font-size: 1.2em;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .start-btn:hover { background: #16a34a; }

        /* HUD Layouts */
        .hud {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #cbd5e1;
            position: absolute;
            width: 220px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .opponent-hud { top: 30px; left: 40px; }
        
        /* Moved up to prevent overlapping the expanded UI panel */
        .player-hud { bottom: 220px; right: 40px; }
        
        .hp-text {
            font-size: 0.8em;
            color: #475569;
            text-align: right;
            margin-top: 2px;
        }
        .hp-bar-container {
            width: 100%;
            height: 10px;
            background: #cbd5e1;
            border-radius: 5px;
            margin-top: 5px;
            overflow: hidden;
        }
        .hp-bar {
            height: 100%;
            background: #22c55e; 
            width: 100%;
            transition: width 0.4s ease-out;
        }

        .sprite {
            position: absolute;
            width: 160px;
            height: 160px;
            object-fit: contain;
            image-rendering: pixelated;
        }
        .opponent-sprite { top: 60px; right: 100px; }
        
        /* Moved up to prevent overlapping the expanded UI panel */
        .player-sprite { bottom: 220px; left: 100px; transform: scaleX(-1); }

        /* Expanded User Controls Bar */
        .ui-panel {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 200px; /* Expanded from 140px to safely fit all buttons */
            background: #ffffff;
            border-top: 4px solid #334155;
            display: flex;
        }
        
        .dialogue-box {
            flex: 1;
            padding: 15px;
            font-size: 1.05em;
            color: #1e293b;
            border-right: 2px solid #cbd5e1;
            font-family: monospace;
            white-space: pre-line;
            overflow-y: auto;
        }

        .moves-panel {
            width: 440px; /* Slightly wider */
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto;
            gap: 8px;
            padding: 12px;
            background: #f8fafc;
            overflow-y: auto;
        }

        .move-btn {
            background: #e2e8f0;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            color: #334155;
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 45px;
        }
        .move-type {
            font-size: 0.7em;
            color: #64748b;
            margin-top: 1px;
        }
        .move-btn:hover:not(:disabled) { background: #bfdbfe; border-color: #3b82f6; }
        .move-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .switch-menu-btn {
            grid-column: span 2;
            background: #3b82f6;
            color: white;
            border-color: #2563eb;
        }
        .switch-menu-btn:hover:not(:disabled) { background: #1d4ed8; }
        
        .back-btn {
            background: #64748b;
            border-color: #475569;
        }
        .back-btn:hover:not(:disabled) { background: #475569; }

        .status-badge {
            display: inline-block;
            font-size: 0.68em;
            font-weight: bold;
            padding: 1px 5px;
            border-radius: 4px;
            margin-left: 5px;
            vertical-align: middle;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>

    <audio id="battle-music" loop>
        <source src="battle-theme.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <div class="setup-box">
            <h2 style="margin-top: 0;">⚔️ Roster Battle Setup</h2>
            <label>Match Room ID:</label>
            <input type="text" id="room-input" class="input-field" value="arena1">
            
            <label>Select Player Role:</label>
            <div class="radio-group">
                <label><input type="radio" name="role" value="p1" checked> Player 1 (Host)</label>
                <label><input type="radio" name="role" value="p2"> Player 2 (Guest)</label>
            </div>
            
            <button class="start-btn" id="connect-btn">CONNECT & BATTLE</button>
        </div>
    </div>

    <div class="battle-container" id="battle-arena">
        <div class="hud opponent-hud">
            <div><strong id="opp-name">Waiting...</strong><span id="opp-status-badge" class="status-badge" style="display:none"></span></div>
            <div class="hp-bar-container"><div class="hp-bar" id="opp-hp"></div></div>
            <div class="hp-text" id="opp-hp-text">-- / --</div>
        </div>
        <img src="" class="sprite opponent-sprite" id="opp-sprite" alt="Opponent">

        <div class="hud player-hud">
            <div><strong id="player-name">Loading...</strong><span id="player-status-badge" class="status-badge" style="display:none"></span></div>
            <div class="hp-bar-container"><div class="hp-bar" id="player-hp"></div></div>
            <div class="hp-text" id="player-hp-text">-- / --</div>
        </div>
        <img src="" class="sprite player-sprite" id="player-sprite" alt="Player">

        <div class="ui-panel">
            <div class="dialogue-box" id="dialogue">Connecting to database network...</div>
            <div class="moves-panel" id="moves-panel"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBr49eujOYIpnO_ysSBUfxFX3CMPPfkTPg",
        authDomain: "teambuilder-8563d.firebaseapp.com",
        projectId: "teambuilder-8563d",
        storageBucket: "teambuilder-8563d.firebasestorage.app",
        messagingSenderId: "963597185834",
        appId: "1:963597185834:web:d7ff620bb07687700b2453",
        measurementId: "G-9TBZ9FPDPV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const typeChart = {
        "Normal": { "Ghost": 0, "Steel": 0.5 },
        "Fire": { "Fire": 0.5, "Water": 0.5, "Grass": 2.0, "Bug": 2.0, "Steel": 2.0, "Dragon": 0.5 },
        "Water": { "Fire": 2.0, "Water": 0.5, "Grass": 0.5, "Ground": 2.0, "Dragon": 0.5 },
        "Grass": { "Fire": 0.5, "Water": 2.0, "Grass": 0.5, "Poison": 0.5, "Ground": 2.0, "Bug": 0.5, "Steel": 0.5, "Dragon": 0.5 },
        "Electric": { "Water": 2.0, "Electric": 0.5, "Grass": 0.5, "Ground": 0, "Dragon": 0.5 },
        "Poison": { "Grass": 2.0, "Poison": 0.5, "Ground": 0.5, "Ghost": 0.5, "Steel": 0 },
        "Ground": { "Fire": 2.0, "Electric": 2.0, "Grass": 0.5, "Poison": 2.0, "Bug": 0.5, "Steel": 2.0 },
        "Bug": { "Fire": 0.5, "Grass": 2.0, "Poison": 0.5, "Ghost": 0.5, "Steel": 0.5 },
        "Ghost": { "Normal": 0, "Ghost": 2.0 },
        "Steel": { "Fire": 0.5, "Water": 0.5, "Electric": 0.5, "Steel": 0.5 },
        "Dragon": { "Steel": 0.5, "Dragon": 2.0 }
    };

    // ─────────────────────────────────────────────────────────────────────
    // MOVE DATABASE
    // Each entry: { type, category, power, accuracy, effect? }
    //   category : "Physical" | "Special" | "Status"
    //   power    : base power (0 for status-only moves)
    //   accuracy : hit chance 0-100 (omit or 100 = always hits)
    //   effect   : optional { status: "<KEY>", chance: 0-100 }
    //              status keys: BRN PSN TOX PAR SLP FRZ CNF INF
    // ─────────────────────────────────────────────────────────────────────
    const moveDatabase = {
        // ── Normal ──────────────────────────────────────────────────────
        "Tackle":        { type: "Normal",   category: "Physical", power: 40,  accuracy: 100 },
        "Body Slam":     { type: "Normal",   category: "Physical", power: 85,  accuracy: 100, effect: { status: "PAR", chance: 30 } },
        "Double-Edge":   { type: "Normal",   category: "Physical", power: 120, accuracy: 100 },
        "Attract":       { type: "Normal",   category: "Status",   power: 0,   accuracy: 100, effect: { status: "INF", chance: 100 } },

        // ── Fire ────────────────────────────────────────────────────────
        "Flamethrower":  { type: "Fire",     category: "Special",  power: 90,  accuracy: 100, effect: { status: "BRN", chance: 10 } },
        "Lava Plume":    { type: "Fire",     category: "Special",  power: 80,  accuracy: 100, effect: { status: "BRN", chance: 30 } },
        "Will-O-Wisp":   { type: "Fire",     category: "Status",   power: 0,   accuracy: 85,  effect: { status: "BRN", chance: 100 } },

        // ── Water ───────────────────────────────────────────────────────
        "Water Gun":     { type: "Water",    category: "Special",  power: 40,  accuracy: 100 },
        "Hydro Pump":    { type: "Water",    category: "Special",  power: 110, accuracy: 80 },
        "Chilling Water":{ type: "Water",    category: "Special",  power: 50,  accuracy: 100 },
        "Scald":         { type: "Water",    category: "Special",  power: 80,  accuracy: 100, effect: { status: "BRN", chance: 30 } },

        // ── Grass ───────────────────────────────────────────────────────
        "Vine Whip":     { type: "Grass",    category: "Physical", power: 45,  accuracy: 100 },
        "Energy Ball":   { type: "Grass",    category: "Special",  power: 90,  accuracy: 100 },
        "Sleep Powder":  { type: "Grass",    category: "Status",   power: 0,   accuracy: 75,  effect: { status: "SLP", chance: 100 } },
        "Spore":         { type: "Grass",    category: "Status",   power: 0,   accuracy: 100, effect: { status: "SLP", chance: 100 } },

        // ── Electric ────────────────────────────────────────────────────
        "Thunderbolt":   { type: "Electric", category: "Special",  power: 90,  accuracy: 100, effect: { status: "PAR", chance: 10 } },
        "Discharge":     { type: "Electric", category: "Special",  power: 80,  accuracy: 100, effect: { status: "PAR", chance: 30 } },
        "Thunder Wave":  { type: "Electric", category: "Status",   power: 0,   accuracy: 90,  effect: { status: "PAR", chance: 100 } },

        // ── Poison ──────────────────────────────────────────────────────
        "Sludge Bomb":   { type: "Poison",   category: "Special",  power: 90,  accuracy: 100, effect: { status: "PSN", chance: 30 } },
        "Toxic":         { type: "Poison",   category: "Status",   power: 0,   accuracy: 90,  effect: { status: "TOX", chance: 100 } },

        // ── Ghost ───────────────────────────────────────────────────────
        "Shadow Ball":   { type: "Ghost",    category: "Special",  power: 80,  accuracy: 100 },
        "Astonish":      { type: "Ghost",    category: "Physical", power: 30,  accuracy: 100 },
        "Confuse Ray":   { type: "Ghost",    category: "Status",   power: 0,   accuracy: 100, effect: { status: "CNF", chance: 100 } },

        // ── Fighting ────────────────────────────────────────────────────
        "Close Combat":  { type: "Fighting", category: "Physical", power: 120, accuracy: 100 },
        "Vacuum Wave":   { type: "Fighting", category: "Special",  power: 40,  accuracy: 100 },
        "Detect":        { type: "Fighting", category: "Status",   power: 0,   accuracy: 100 },

        // ── Bug ─────────────────────────────────────────────────────────
        "Pounce":        { type: "Bug",      category: "Physical", power: 50,  accuracy: 100 },

        // ── Steel ───────────────────────────────────────────────────────
        "Bullet Punch":  { type: "Steel",    category: "Physical", power: 40,  accuracy: 100 },

        // ── Dragon ──────────────────────────────────────────────────────
        "Outrage":       { type: "Dragon",   category: "Physical", power: 120, accuracy: 100 },

        // ── Rock ────────────────────────────────────────────────────────
        "Rollout":       { type: "Rock",     category: "Physical", power: 30,  accuracy: 90 },
    };

    // ─────────────────────────────────────────────────────────────────────
    // STATUS DEFINITIONS  (display info only — logic is inline in the engine)
    // Each mon in Firebase may have:
    //   status        : primary status key (BRN/PSN/TOX/PAR/SLP/FRZ) or null
    //   statusCounter : sleep turns remaining | TOX escalation counter
    //   confused      : boolean (volatile — cleared on switch)
    //   infatuated    : boolean (volatile — cleared on switch)
    // ─────────────────────────────────────────────────────────────────────
    const statusDefs = {
        "BRN": { label: "BRN", emoji: "🔥", color: "#7f1d1d", bg: "#fecaca" },
        "PSN": { label: "PSN", emoji: "☠️", color: "#4c1d95", bg: "#ddd6fe" },
        "TOX": { label: "TOX", emoji: "☠️", color: "#3b0764", bg: "#e9d5ff" },
        "PAR": { label: "PAR", emoji: "⚡", color: "#713f12", bg: "#fef08a" },
        "SLP": { label: "SLP", emoji: "💤", color: "#1e293b", bg: "#e2e8f0" },
        "FRZ": { label: "FRZ", emoji: "❄️", color: "#0c4a6e", bg: "#bae6fd" },
        "CNF": { label: "CNF", emoji: "😵", color: "#7c2d12", bg: "#fed7aa" },
        "INF": { label: "INF", emoji: "💕", color: "#831843", bg: "#fbcfe8" },
    };

    let myRole = "p1";       
    let oppRole = "p2";      
    let roomId = "arena1";
    let roomRef = null;
    let localTeamSetup = null; 
    let currentMatchData = null;
    let viewingSwitchMenu = false; 

    const bgMusic = document.getElementById('battle-music');
    bgMusic.volume = 0.3;

    document.getElementById('connect-btn').onclick = function() {
        roomId = document.getElementById('room-input').value.trim() || "arena1";
        myRole = document.querySelector('input[name="role"]:checked').value;
        oppRole = myRole === "p1" ? "p2" : "p1";
        roomRef = ref(db, 'matches/' + roomId);

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('battle-arena').style.display = 'block';
        bgMusic.play();

        setupMultiplayerMatch();
    };

    function loadLocalTeamStructure() {
        const savedData = localStorage.getItem('myShowdownTeam');
        let parsedRoster = [];
        if (savedData) {
            try {
                const team = JSON.parse(savedData);
                team.forEach(slot => {
                    if (slot && slot.pokemon && slot.pokemon.stats) {
                        parsedRoster.push({
                            name: slot.pokemon.name,
                            type: slot.pokemon.type || "Normal",
                            sprite: slot.pokemon.sprite,
                            hp: slot.pokemon.stats.hp,
                            maxHp: slot.pokemon.stats.hp,
                            atk: slot.pokemon.stats.atk,
                            def: slot.pokemon.stats.def,
                            spe: slot.pokemon.stats.spe,
                            moves: slot.moves.filter(m => m !== "")
                        });
                    }
                });
            } catch (e) { console.error(e); }
        }
        
        if (parsedRoster.length === 0) {
            if (myRole === "p1") {
                parsedRoster = [
                    { name: "Pikachu", type: "Electric", sprite: "sprites/pikachu.png", hp: 115, maxHp: 115, atk: 55, def: 40, spe: 90, moves: ["Thunderbolt", "Tackle"] },
                    { name: "Snorlax", type: "Normal", sprite: "sprites/snorlax.png", hp: 260, maxHp: 260, atk: 110, def: 65, spe: 30, moves: ["Body Slam", "Tackle"] }
                ];
            } else {
                parsedRoster = [
                    { name: "Gengar", type: "Ghost/Poison", sprite: "sprites/gengar.png", hp: 140, maxHp: 140, atk: 65, def: 60, spe: 110, moves: ["Shadow Ball", "Sludge Bomb"] },
                    { name: "Scizor", type: "Bug/Steel", sprite: "sprites/scizor.png", hp: 170, maxHp: 170, atk: 130, def: 100, spe: 65, moves: ["Bullet Punch", "Tackle"] }
                ];
            }
        }
        return {
            team: parsedRoster,
            activeIndex: 0
        };
    }

    function setupMultiplayerMatch() {
        localTeamSetup = loadLocalTeamStructure();

        if (myRole === "p1") {
            // BUG FIX: this previously used set(), which completely overwrites the
            // room node. If Player 1 refreshed/reconnected after Player 2 had
            // already written their team, set() would silently erase Player 2's
            // data (and the whole match state). update() merges instead, so an
            // already-joined opponent's data is preserved.
            update(roomRef, {
                turn: 0,
                lastTurnSummary: "Waiting for Player 2 to join...",
                actions: { p1Move: "", p2Move: "" },
                p1: localTeamSetup
            });
        } else {
            update(ref(db, `matches/${roomId}/${myRole}`), localTeamSetup);
        }

        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            currentMatchData = data;

            if (data.turn === 0 && data.p1 && data.p2) {
                if (myRole === "p1") {
                    update(roomRef, {
                        turn: 1,
                        lastTurnSummary: "The match has begun!\nWhat will your team do?"
                    });
                }
                return;
            }

            if (data.turn > 0) {
                syncUserInterface(data);
                evaluateTurnCalculations(data);
            }
        });
    }

    // Helper: update an HP bar element's color based on current percentage
    function setHpBarColor(barEl, pct) {
        barEl.style.background = pct > 50 ? "#22c55e" : pct > 20 ? "#eab308" : "#ef4444";
        barEl.style.width = `${pct}%`;
    }

    // Helper: render a status badge in a <span>
    function renderStatusBadge(spanEl, mon) {
        // Collect all active statuses to show (primary + volatile)
        const badges = [];
        if (mon.status && statusDefs[mon.status]) {
            const d = statusDefs[mon.status];
            badges.push(`<span class="status-badge" style="color:${d.color};background:${d.bg}">${d.emoji} ${d.label}</span>`);
        }
        if (mon.confused)   badges.push(`<span class="status-badge" style="color:#7c2d12;background:#fed7aa">😵 CNF</span>`);
        if (mon.infatuated) badges.push(`<span class="status-badge" style="color:#831843;background:#fbcfe8">💕 INF</span>`);
        spanEl.innerHTML = badges.join("");
        spanEl.style.display = badges.length ? "inline" : "none";
    }

    function syncUserInterface(data) {
        const me = data[myRole];
        const opp = data[oppRole];
        if (!me || !opp) return;

        const activeMe = me.team[me.activeIndex];
        const activeOpp = opp.team[opp.activeIndex];

        document.getElementById('player-name').innerText = activeMe.name;
        document.getElementById('player-sprite').src = activeMe.sprite;
        document.getElementById('player-hp-text').innerText = `${activeMe.hp} / ${activeMe.maxHp}`;
        setHpBarColor(document.getElementById('player-hp'), (activeMe.hp / activeMe.maxHp) * 100);
        renderStatusBadge(document.getElementById('player-status-badge'), activeMe);

        document.getElementById('opp-name').innerText = activeOpp.name;
        document.getElementById('opp-sprite').src = activeOpp.sprite;
        document.getElementById('opp-hp-text').innerText = `${activeOpp.hp} / ${activeOpp.maxHp}`;
        setHpBarColor(document.getElementById('opp-hp'), (activeOpp.hp / activeOpp.maxHp) * 100);
        renderStatusBadge(document.getElementById('opp-status-badge'), activeOpp);

        document.getElementById('dialogue').innerText = data.lastTurnSummary;

        const myTeamWiped = me.team.every(mon => mon.hp <= 0);
        const oppTeamWiped = opp.team.every(mon => mon.hp <= 0);

        if (myTeamWiped || oppTeamWiped) {
            setButtonsDisabled(true);
            buildEmptyControlPanel();
            if (myTeamWiped && oppTeamWiped) {
                document.getElementById('dialogue').innerText += "\n\nAll combatants fainted! The match is a draw!";
            } else if (myTeamWiped) {
                document.getElementById('dialogue').innerText += "\n\nYou have no functional units remaining! You lost!";
            } else {
                document.getElementById('dialogue').innerText += "\n\nThe enemy team has been eliminated! Victory is yours!";
            }
            return;
        }

        if (activeMe.hp <= 0 || activeOpp.hp <= 0) {
            const myActionKey = `${myRole}Move`;
            
            if (activeMe.hp <= 0) {
                document.getElementById('dialogue').innerText = `${activeMe.name} fainted! You must deploy a replacement.`;
                
                if (data.actions && data.actions[myActionKey] && data.actions[myActionKey].startsWith("SWITCH")) {
                    document.getElementById('dialogue').innerText = "Waiting for your opponent to confirm...";
                    setButtonsDisabled(true);
                    buildEmptyControlPanel();
                } else {
                    viewingSwitchMenu = true; 
                    buildForcedSwitchPanel(me.team, me.activeIndex);
                }
            } else {
                document.getElementById('dialogue').innerText = `Waiting for opponent to replace ${activeOpp.name}...`;
                setButtonsDisabled(true);
                buildEmptyControlPanel();
                
                if (!data.actions || data.actions[myActionKey] !== "WAIT") {
                    submitActionChoice("WAIT");
                }
            }
            return; 
        }

        const myActionKey = `${myRole}Move`;
        if (data.actions && data.actions[myActionKey] && data.actions[myActionKey] !== "WAIT") {
            document.getElementById('dialogue').innerText = "Waiting for your opponent to confirm an action...";
            setButtonsDisabled(true);
            buildEmptyControlPanel();
        } else {
            if (viewingSwitchMenu) {
                buildSwitchMenuPanel(me.team, me.activeIndex, false);
            } else {
                buildActionMovePanel(activeMe.moves, me.team.length);
            }
        }
    }

    function buildActionMovePanel(moveList, teamLength) {
        const panel = document.getElementById('moves-panel');
        panel.innerHTML = '';
        
        for (let i = 0; i < 4; i++) {
            const btn = document.createElement('button');
            btn.className = 'move-btn';
            const moveName = moveList ? moveList[i] : null;
            if (moveName && moveDatabase[moveName]) {
                const md = moveDatabase[moveName];
                const accText = (md.accuracy != null && md.accuracy < 100) ? ` · ${md.accuracy}%` : "";
                btn.innerHTML = `<div>${moveName}</div><div class="move-type">${md.type}${accText}</div>`;
                btn.onclick = () => submitActionChoice(moveName);
            } else {
                btn.innerText = "---";
                btn.disabled = true;
            }
            panel.appendChild(btn);
        }

        // Only show the switch button if you have a bench to switch to!
        if (teamLength > 1) {
            const switchToggle = document.createElement('button');
            switchToggle.className = 'move-btn switch-menu-btn';
            switchToggle.innerText = '🔄 Switch Pokémon';
            switchToggle.onclick = () => {
                viewingSwitchMenu = true;
                syncUserInterface(currentMatchData);
            };
            panel.appendChild(switchToggle);
        }
    }

    function buildSwitchMenuPanel(teamList, activeIdx, isForced) {
        const panel = document.getElementById('moves-panel');
        panel.innerHTML = '';

        teamList.forEach((mon, index) => {
            if (index === activeIdx) return; 
            const btn = document.createElement('button');
            btn.className = 'move-btn';
            btn.innerHTML = `<div>${mon.name}</div><div class="move-type">${mon.hp}/${mon.maxHp} HP</div>`;
            
            if (mon.hp <= 0) {
                btn.disabled = true;
            } else {
                btn.onclick = () => {
                    viewingSwitchMenu = false;
                    submitActionChoice(`SWITCH:${index}`);
                };
            }
            panel.appendChild(btn);
        });

        if (!isForced) {
            const backBtn = document.createElement('button');
            backBtn.className = 'move-btn switch-menu-btn back-btn';
            backBtn.innerText = '⬅️ Back to Moves';
            backBtn.onclick = () => {
                viewingSwitchMenu = false;
                syncUserInterface(currentMatchData);
            };
            panel.appendChild(backBtn);
        }
    }

    function buildForcedSwitchPanel(teamList, activeIdx) {
        buildSwitchMenuPanel(teamList, activeIdx, true);
    }

    function buildEmptyControlPanel() {
        const panel = document.getElementById('moves-panel');
        panel.innerHTML = '';
    }

    function submitActionChoice(actionString) {
        setButtonsDisabled(true);
        const updatePayload = {};
        updatePayload[`actions/${myRole}Move`] = actionString;
        update(roomRef, updatePayload);
    }

    function setButtonsDisabled(shouldDisable) {
        document.querySelectorAll('.move-btn').forEach(b => b.disabled = shouldDisable);
    }

    // ─────────────────────────────────────────────────────────────────────
    // STATUS ENGINE HELPERS
    // These operate on plain mon objects (deep-copied from Firebase) so they
    // are safe to mutate freely before writing back.
    // ─────────────────────────────────────────────────────────────────────

    // Try to apply a status to a mon. Returns false and does nothing if the
    // mon is already immune (by type) or already has a primary status.
    function applyStatus(mon, key) {
        const t = mon.type || "";
        // Volatile statuses: confusion and infatuation
        if (key === "CNF") { mon.confused   = true; return true; }
        if (key === "INF") { mon.infatuated = true; return true; }
        // Primary statuses can't stack
        if (mon.status) return false;
        // Type immunities
        if (key === "BRN" && t.includes("Fire"))                             return false;
        if ((key === "PSN" || key === "TOX") && (t.includes("Poison") || t.includes("Steel"))) return false;
        if (key === "PAR" && t.includes("Electric"))                         return false;
        if (key === "FRZ" && t.includes("Ice"))                              return false;
        mon.status = key;
        // Initialise counters
        if (key === "SLP") mon.statusCounter = Math.floor(Math.random() * 3) + 1; // 1-3 turns
        else if (key === "TOX") mon.statusCounter = 1; // starts at 1/16
        else mon.statusCounter = 0;
        return true;
    }

    // Check whether a mon's status blocks it from moving this turn.
    // Mutates mon (decrements sleep counter, thaws freeze).
    // Returns { blocked: bool, log: string }
    function checkStatusBlock(mon) {
        if (mon.status === "SLP") {
            if (mon.statusCounter > 0) {
                mon.statusCounter--;
                return { blocked: true, log: `${mon.name} is fast asleep!\n` };
            }
            mon.status = null;
            return { blocked: false, log: `${mon.name} woke up!\n` };
        }
        if (mon.status === "FRZ") {
            if (Math.random() < 0.20) {
                mon.status = null;
                return { blocked: false, log: `${mon.name} thawed out!\n` };
            }
            return { blocked: true, log: `${mon.name} is frozen solid!\n` };
        }
        if (mon.status === "PAR" && Math.random() < 0.25) {
            return { blocked: true, log: `${mon.name} is fully paralyzed and can't move!\n` };
        }
        if (mon.infatuated && Math.random() < 0.5) {
            return { blocked: true, log: `${mon.name} is infatuated and can't bring itself to attack!\n` };
        }
        return { blocked: false, log: "" };
    }

    // Handle confusion self-hit. Returns { selfHit: bool, log: string }.
    // Mutates mon.hp on a self-hit.
    function handleConfusion(mon) {
        if (!mon.confused) return { selfHit: false, log: "" };
        if (Math.random() < 0.5) {
            const dmg = Math.max(1, Math.floor((((22 * 40 * (mon.atk || 10)) / (mon.def || 10)) / 50) + 2));
            mon.hp = Math.max(0, mon.hp - dmg);
            return { selfHit: true, log: `${mon.name} is confused and hurt itself! (${dmg} damage)\n` };
        }
        return { selfHit: false, log: `${mon.name} is confused!\n` };
    }

    // Apply end-of-turn damage (BRN / PSN / TOX). Mutates mon.hp and TOX counter.
    // Returns a log string (may be empty).
    function applyEndOfTurnEffects(mon) {
        if (mon.hp <= 0) return "";
        if (mon.status === "BRN") {
            const dmg = Math.max(1, Math.floor(mon.maxHp / 8));
            mon.hp = Math.max(0, mon.hp - dmg);
            return `${mon.name} is hurt by its burn! (${dmg} damage)\n`;
        }
        if (mon.status === "PSN") {
            const dmg = Math.max(1, Math.floor(mon.maxHp / 8));
            mon.hp = Math.max(0, mon.hp - dmg);
            return `${mon.name} is hurt by poison! (${dmg} damage)\n`;
        }
        if (mon.status === "TOX") {
            const n   = mon.statusCounter || 1;
            const dmg = Math.max(1, Math.floor(mon.maxHp / 16 * n));
            mon.hp  = Math.max(0, mon.hp - dmg);
            mon.statusCounter = n + 1;
            return `${mon.name} is badly poisoned! (${dmg} damage)\n`;
        }
        return "";
    }

    // ─────────────────────────────────────────────────────────────────────
    function evaluateTurnCalculations(data) {
        if (myRole !== "p1") return;
        if (!data.actions || !data.actions.p1Move || !data.actions.p2Move) return;

        try {
            let p1 = JSON.parse(JSON.stringify(data.p1));
            let p2 = JSON.parse(JSON.stringify(data.p2));
            const act1 = data.actions.p1Move;
            const act2 = data.actions.p2Move;

            let turnLog = "";

            // ── Phase 1: Switches (before attacks, clear volatile statuses) ──
            let p1Switched = false;
            let p2Switched = false;

            if (act1.startsWith("SWITCH:")) {
                const nextIdx = parseInt(act1.split(":")[1], 10);
                p1.activeIndex = nextIdx;
                const switchedIn = p1.team[p1.activeIndex];
                switchedIn.confused   = false;
                switchedIn.infatuated = false;
                turnLog += `P1 sent out ${switchedIn.name}!\n`;
                p1Switched = true;
            }
            if (act2.startsWith("SWITCH:")) {
                const nextIdx = parseInt(act2.split(":")[1], 10);
                p2.activeIndex = nextIdx;
                const switchedIn = p2.team[p2.activeIndex];
                switchedIn.confused   = false;
                switchedIn.infatuated = false;
                turnLog += `P2 sent out ${switchedIn.name}!\n`;
                p2Switched = true;
            }
            if (p1Switched || p2Switched) turnLog += "\n";

            let mon1 = p1.team[p1.activeIndex];
            let mon2 = p2.team[p2.activeIndex];

            const p1Attacking = !p1Switched && act1 !== "WAIT";
            const p2Attacking = !p2Switched && act2 !== "WAIT";

            // Paralysis halves effective speed
            const spe1 = (mon1.spe || 50) * (mon1.status === "PAR" ? 0.25 : 1);
            const spe2 = (mon2.spe || 50) * (mon2.status === "PAR" ? 0.25 : 1);

            // ── Phase 2: Attacks (in speed order, ties broken randomly) ──
            // Closure: runs a full attack attempt for attacker → defender.
            function tryAttack(attacker, defender, moveName) {
                // 2a. Status block check
                const block = checkStatusBlock(attacker);
                if (block.log) turnLog += block.log;
                if (block.blocked) return;

                // 2b. Confusion self-damage check
                const conf = handleConfusion(attacker);
                if (conf.log) turnLog += conf.log;
                if (conf.selfHit) return;

                const moveData = moveDatabase[moveName];

                // 2c. Accuracy check
                const acc = (moveData && moveData.accuracy != null) ? moveData.accuracy : 100;
                if (Math.random() * 100 >= acc) {
                    turnLog += `${attacker.name} used ${moveName}!\nBut it missed!\n\n`;
                    return;
                }

                // 2d. Damage
                const resolution = computeDamageImpact(attacker, defender, moveName);
                if (resolution.damage > 0) {
                    defender.hp = Math.max(0, defender.hp - resolution.damage);
                }

                turnLog += `${attacker.name} used ${moveName}!\n`;
                if (resolution.text) turnLog += resolution.text;
                if (moveData && moveData.power === 0) {
                    // Status-only move: no damage line
                } else if (resolution.damage > 0) {
                    turnLog += `It dealt ${resolution.damage} damage.\n`;
                }
                turnLog += "\n";

                // 2e. Move effect: try to inflict status on the defender
                if (moveData && moveData.effect && defender.hp > 0) {
                    const eff = moveData.effect;
                    if (Math.random() * 100 < eff.chance) {
                        const applied = applyStatus(defender, eff.status);
                        if (applied) {
                            const sd = statusDefs[eff.status];
                            turnLog += `${defender.name} was inflicted with ${sd ? sd.emoji + " " + sd.label : eff.status}!\n\n`;
                        }
                    }
                }
            }

            const p1First = spe1 > spe2 || (spe1 === spe2 && Math.random() < 0.5);

            if (p1Attacking && p2Attacking) {
                if (p1First) {
                    tryAttack(mon1, mon2, act1);
                    if (mon2.hp > 0) tryAttack(mon2, mon1, act2);
                    else turnLog += `${mon2.name} fainted before it could strike!\n\n`;
                } else {
                    tryAttack(mon2, mon1, act2);
                    if (mon1.hp > 0) tryAttack(mon1, mon2, act1);
                    else turnLog += `${mon1.name} fainted before it could strike!\n\n`;
                }
            } else if (p1Attacking) {
                tryAttack(mon1, mon2, act1);
            } else if (p2Attacking) {
                tryAttack(mon2, mon1, act2);
            }

            // ── Phase 3: End-of-turn effects (burn / poison / toxic) ──
            const eot1 = applyEndOfTurnEffects(mon1);
            const eot2 = applyEndOfTurnEffects(mon2);
            if (eot1 || eot2) turnLog += "\n" + eot1 + eot2;

            update(roomRef, {
                p1,
                p2,
                actions: { p1Move: "", p2Move: "" },
                lastTurnSummary: turnLog.trim(),
                turn: data.turn + 1
            });

        } catch (error) {
            console.error("Battle Engine Error:", error);
            update(roomRef, {
                actions: { p1Move: "", p2Move: "" },
                lastTurnSummary: "⚠️ A system error occurred. The turn was skipped.",
                turn: data.turn + 1
            });
        }
    }

    function getEffectiveness(moveType, targetTypeString) {
        if (!targetTypeString) return 1;
        const types = targetTypeString.split('/');
        let mult = 1;
        types.forEach(t => {
            if (typeChart[moveType] && typeChart[moveType][t] !== undefined) {
                mult *= typeChart[moveType][t];
            }
        });
        return mult;
    }

    function computeDamageImpact(attacker, defender, moveName) {
        const moveData = moveDatabase[moveName];
        if (!moveData) return { damage: 0, text: "The attack failed...\n" };

        // Status-only moves (power: 0) deal no damage
        if (moveData.power === 0) return { damage: 0, text: "" };

        // Burn halves Physical move damage (attacker's effective Attack)
        const burnMod = (attacker.status === "BRN" && moveData.category === "Physical") ? 0.5 : 1;
        const effAtk  = (attacker.atk || 10) * burnMod;

        const base     = Math.floor((((22 * moveData.power * effAtk) / (defender.def || 10)) / 50) + 2);
        const typeMult = getEffectiveness(moveData.type, defender.type);
        const stabMult = (attacker.type && attacker.type.includes(moveData.type)) ? 1.5 : 1;
        const roll     = (Math.floor(Math.random() * 16) + 85) / 100;

        if (typeMult === 0) return { damage: 0, text: "It had no effect!\n" };

        const finalDamage = Math.floor(base * typeMult * stabMult * roll);

        let msg = "";
        if (typeMult > 1) msg = "It's super effective!\n";
        if (typeMult < 1) msg = "It's not very effective...\n";

        return { damage: Math.max(1, finalDamage), text: msg };
    }
</script>
