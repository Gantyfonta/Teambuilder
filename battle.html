<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Arena</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e293b;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .battle-container {
            width: 800px;
            height: 500px;
            background: linear-gradient(to bottom, #7dd3fc, #e0f2fe, #dcfce7, #86efac); 
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border: 4px solid #334155;
            display: none; 
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .start-btn {
            padding: 15px 30px;
            font-size: 1.5em;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .start-btn:hover { background: #dc2626; }

        .hud {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #cbd5e1;
            position: absolute;
            width: 220px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .opponent-hud { top: 30px; left: 40px; }
        .player-hud { bottom: 160px; right: 40px; }
        
        .hp-text {
            font-size: 0.8em;
            color: #475569;
            text-align: right;
            margin-top: 2px;
        }
        .hp-bar-container {
            width: 100%;
            height: 10px;
            background: #cbd5e1;
            border-radius: 5px;
            margin-top: 5px;
            overflow: hidden;
        }
        .hp-bar {
            height: 100%;
            background: #22c55e; 
            width: 100%;
            transition: width 0.4s ease-out;
        }

        .sprite {
            position: absolute;
            width: 160px;
            height: 160px;
            object-fit: contain;
            image-rendering: pixelated;
        }
        .opponent-sprite { top: 60px; right: 100px; }
        .player-sprite { bottom: 160px; left: 100px; transform: scaleX(-1); }

        .ui-panel {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 140px;
            background: #ffffff;
            border-top: 4px solid #334155;
            display: flex;
        }
        
        .dialogue-box {
            flex: 1;
            padding: 20px;
            font-size: 1.2em;
            color: #1e293b;
            border-right: 2px solid #cbd5e1;
            font-family: monospace;
            white-space: pre-line;
        }

        .moves-panel {
            width: 400px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 15px;
            background: #f8fafc;
        }

        .move-btn {
            background: #e2e8f0;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            color: #334155;
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .move-type {
            font-size: 0.75em;
            color: #64748b;
            margin-top: 2px;
        }
        .move-btn:hover:not(:disabled) { background: #bfdbfe; border-color: #3b82f6; }
        .move-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <audio id="battle-music" loop>
        <source src="battle-theme.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <h1 style="margin-bottom: 20px;">Ready to Battle?</h1>
        <button class="start-btn" onclick="startBattle()">BATTLE!</button>
    </div>

    <div class="battle-container" id="battle-arena">
        <div class="hud opponent-hud">
            <strong id="opp-name">Wild Gengar</strong>
            <div class="hp-bar-container"><div class="hp-bar" id="opp-hp"></div></div>
            <div class="hp-text" id="opp-hp-text">140 / 140</div>
        </div>
        <img src="sprites/gengar.png" class="sprite opponent-sprite" id="opp-sprite" alt="Opponent">

        <div class="hud player-hud">
            <strong id="player-name">Loading...</strong>
            <div class="hp-bar-container"><div class="hp-bar" id="player-hp"></div></div>
            <div class="hp-text" id="player-hp-text">100 / 100</div>
        </div>
        <img src="" class="sprite player-sprite" id="player-sprite" alt="Player">

        <div class="ui-panel">
            <div class="dialogue-box" id="dialogue">What will your Pokémon do?</div>
            <div class="moves-panel" id="moves-panel"></div>
        </div>
    </div>

<script>
    const bgMusic = document.getElementById('battle-music');
    bgMusic.volume = 0.4;

    // --- NEW: Type Effectiveness Chart ---
    const typeChart = {
        "Normal": { "Ghost": 0, "Steel": 0.5 },
        "Fire": { "Fire": 0.5, "Water": 0.5, "Grass": 2.0, "Bug": 2.0, "Steel": 2.0, "Dragon": 0.5 },
        "Water": { "Fire": 2.0, "Water": 0.5, "Grass": 0.5, "Ground": 2.0, "Dragon": 0.5 },
        "Grass": { "Fire": 0.5, "Water": 2.0, "Grass": 0.5, "Poison": 0.5, "Ground": 2.0, "Bug": 0.5, "Steel": 0.5, "Dragon": 0.5 },
        "Electric": { "Water": 2.0, "Electric": 0.5, "Grass": 0.5, "Ground": 0, "Dragon": 0.5 },
        "Poison": { "Grass": 2.0, "Poison": 0.5, "Ground": 0.5, "Ghost": 0.5, "Steel": 0 },
        "Ground": { "Fire": 2.0, "Electric": 2.0, "Grass": 0.5, "Poison": 2.0, "Bug": 0.5, "Steel": 2.0 },
        "Bug": { "Fire": 0.5, "Grass": 2.0, "Poison": 0.5, "Ghost": 0.5, "Steel": 0.5 },
        "Ghost": { "Normal": 0, "Ghost": 2.0 },
        "Steel": { "Fire": 0.5, "Water": 0.5, "Electric": 0.5, "Steel": 0.5 },
        "Dragon": { "Steel": 0.5, "Dragon": 2.0 }
    };

    const moveDatabase = {
        "Tackle": { type: "Normal", power: 40 },
        "Vine Whip": { type: "Grass", power: 45 },
        "Sludge Bomb": { type: "Poison", power: 90 },
        "Flamethrower": { type: "Fire", power: 90 },
        "Water Gun": { type: "Water", power: 40 },
        "Thunderbolt": { type: "Electric", power: 90 },
        "Shadow Ball": { type: "Ghost", power: 80 },
        "Body Slam": { type: "Normal", power: 85 },
        "Outrage": { type: "Dragon", power: 120 },
        "Astonish": { type: "Ghost", power: 30 },
        "Pounce": { type: "Bug", power: 50 },
        "Bullet Punch": { type: "Steel", power: 40 }
    };

    let playerMon = null;
    let oppMon = {
        name: "Wild Gengar",
        type: "Ghost/Poison", // Added type!
        sprite: "sprites/gengar.png",
        stats: { hp: 140, maxHp: 140, atk: 95, def: 60, spe: 110 },
        moves: ["Shadow Ball", "Sludge Bomb", "Tackle"],
        isPlayer: false // Added explicit flag for faints
    };

    function startBattle() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('battle-arena').style.display = 'block';
        bgMusic.play();
        initializePlayerTeam();
    }

    function initializePlayerTeam() {
        const savedData = localStorage.getItem('myShowdownTeam');
        if (savedData) {
            try {
                const team = JSON.parse(savedData);
                const activeSlot = team.find(slot => slot !== null && slot.pokemon && slot.pokemon.stats);
                if (activeSlot) {
                    playerMon = {
                        name: activeSlot.pokemon.name,
                        type: activeSlot.pokemon.type, // Bring in their type
                        sprite: activeSlot.pokemon.sprite,
                        stats: { 
                            hp: activeSlot.pokemon.stats.hp, 
                            maxHp: activeSlot.pokemon.stats.hp, 
                            atk: activeSlot.pokemon.stats.atk, 
                            def: activeSlot.pokemon.stats.def, 
                            spe: activeSlot.pokemon.stats.spe 
                        },
                        moves: activeSlot.moves.filter(m => m !== ""),
                        isPlayer: true
                    };
                }
            } catch (e) {
                console.error("Error reading team:", e);
            }
        }

        if (!playerMon) {
            playerMon = {
                name: "Pikachu (Buddy)",
                type: "Electric",
                sprite: "sprites/pikachu.png",
                stats: { hp: 115, maxHp: 115, atk: 55, def: 40, spe: 90 },
                moves: ["Thunderbolt", "Tackle"],
                isPlayer: true
            };
        }

        document.getElementById('player-name').innerText = playerMon.name;
        document.getElementById('player-sprite').src = playerMon.sprite;
        updateHpBars();
        buildMovePanel();
        document.getElementById('dialogue').innerText = `Go! ${playerMon.name}!`;
    }

    function buildMovePanel() {
        const movesPanel = document.getElementById('moves-panel');
        movesPanel.innerHTML = ''; 

        for (let i = 0; i < 4; i++) {
            const btn = document.createElement('button');
            btn.className = 'move-btn';
            const moveName = playerMon.moves[i];
            
            if (moveName) {
                const mType = moveDatabase[moveName].type;
                btn.innerHTML = `<div>${moveName}</div><div class="move-type">${mType}</div>`;
                btn.onclick = () => handleTurnSequence(moveName);
            } else {
                btn.innerText = "---";
                btn.disabled = true;
            }
            movesPanel.appendChild(btn);
        }
    }

    function setButtonsDisabled(shouldDisable) {
        const buttons = document.querySelectorAll('.move-btn');
        buttons.forEach(btn => btn.disabled = shouldDisable);
    }

    function updateHpBars() {
        const playerPct = (playerMon.stats.hp / playerMon.stats.maxHp) * 100;
        const pBar = document.getElementById('player-hp');
        pBar.style.width = `${playerPct}%`;
        pBar.style.background = playerPct < 20 ? '#ef4444' : playerPct < 50 ? '#eab308' : '#22c55e';
        document.getElementById('player-hp-text').innerText = `${playerMon.stats.hp} / ${playerMon.stats.maxHp}`;

        const oppPct = (oppMon.stats.hp / oppMon.stats.maxHp) * 100;
        const oBar = document.getElementById('opp-hp');
        oBar.style.width = `${oppPct}%`;
        oBar.style.background = oppPct < 20 ? '#ef4444' : oppPct < 50 ? '#eab308' : '#22c55e';
        document.getElementById('opp-hp-text').innerText = `${oppMon.stats.hp} / ${oppMon.stats.maxHp}`;
    }

    // --- Helper Function: Get Type Multiplier ---
    function getEffectiveness(moveType, defenderTypeString) {
        const defTypes = defenderTypeString.split('/'); // Splits "Ghost/Poison" into array
        let multiplier = 1;
        
        defTypes.forEach(t => {
            if (typeChart[moveType] && typeChart[moveType][t] !== undefined) {
                multiplier *= typeChart[moveType][t];
            }
        });
        return multiplier;
    }

    // --- Updated Damage Math ---
    function calculateDamage(attacker, defender, moveName) {
        const moveData = moveDatabase[moveName];
        if (!moveData) return { damage: 0, text: "" };

        // 1. Base Damage Math
        const baseDamage = Math.floor((((22 * moveData.power * attacker.stats.atk) / defender.stats.def) / 50) + 2);
        
        // 2. Type Effectiveness
        const typeMult = getEffectiveness(moveData.type, defender.type);
        
        // 3. STAB (Same Type Attack Bonus - 1.5x damage if types match)
        const stabMult = attacker.type.includes(moveData.type) ? 1.5 : 1;

        // 4. Random Roll
        const randomRoll = (Math.floor(Math.random() * 16) + 85) / 100;
        
        const finalDamage = Math.floor(baseDamage * typeMult * stabMult * randomRoll);
        
        // Check Immunities
        if (typeMult === 0) return { damage: 0, text: "It had no effect!\n" };

        let effectText = "";
        if (typeMult > 1) effectText = "It's super effective!\n";
        if (typeMult < 1) effectText = "It's not very effective...\n";

        return { damage: Math.max(1, finalDamage), text: effectText };
    }

    function handleTurnSequence(playerMove) {
        setButtonsDisabled(true); 
        const dialogue = document.getElementById('dialogue');

        const randomIdx = Math.floor(Math.random() * oppMon.moves.length);
        const oppMove = oppMon.moves[randomIdx];

        let primaryAttacker, secondaryAttacker;
        let primaryMove, secondaryMove;

        if (playerMon.stats.spe >= oppMon.stats.spe) {
            primaryAttacker = playerMon; primaryMove = playerMove;
            secondaryAttacker = oppMon; secondaryMove = oppMove;
        } else {
            primaryAttacker = oppMon; primaryMove = oppMove;
            secondaryAttacker = playerMon; secondaryMove = playerMove;
        }

        dialogue.innerText = `${primaryAttacker.name} used ${primaryMove}!`;
        
        setTimeout(() => {
            const result1 = calculateDamage(primaryAttacker, secondaryAttacker, primaryMove);
            secondaryAttacker.stats.hp = Math.max(0, secondaryAttacker.stats.hp - result1.damage);
            updateHpBars();
            
            let resultText1 = `${primaryAttacker.name} used ${primaryMove}!\n`;
            if (result1.damage === 0) resultText1 += result1.text;
            else resultText1 += `${result1.text}It dealt ${result1.damage} damage.`;
            dialogue.innerText = resultText1;

            if (secondaryAttacker.stats.hp === 0) {
                handleFaintState(secondaryAttacker);
                return; 
            }

            setTimeout(() => {
                dialogue.innerText = `${secondaryAttacker.name} used ${secondaryMove}!`;

                setTimeout(() => {
                    const result2 = calculateDamage(secondaryAttacker, primaryAttacker, secondaryMove);
                    primaryAttacker.stats.hp = Math.max(0, primaryAttacker.stats.hp - result2.damage);
                    updateHpBars();
                    
                    let resultText2 = `${secondaryAttacker.name} used ${secondaryMove}!\n`;
                    if (result2.damage === 0) resultText2 += result2.text;
                    else resultText2 += `${result2.text}It dealt ${result2.damage} damage.`;
                    dialogue.innerText = resultText2;

                    if (primaryAttacker.stats.hp === 0) {
                        handleFaintState(primaryAttacker);
                        return;
                    }

                    setTimeout(() => {
                        dialogue.innerText = "What will your Pokémon do?";
                        buildMovePanel(); 
                    }, 2000);

                }, 1400);
            }, 2000);

        }, 1400);
    }

    // --- Fixed Faint State Logic ---
    function handleFaintState(faintedMon) {
        const dialogue = document.getElementById('dialogue');
        setTimeout(() => {
            dialogue.innerText = `${faintedMon.name} fainted!`;
            
            if (faintedMon.isPlayer) {
                // The Player Fainted
                document.getElementById('player-sprite').style.display = 'none';
                setTimeout(() => dialogue.innerText = "You lost! Better luck next time.", 1500);
            } else {
                // The Opponent Fainted
                document.getElementById('opp-sprite').style.display = 'none';
                setTimeout(() => dialogue.innerText = "You defeated Wild Gengar! You win!", 1500);
            }
        }, 1200);
    }
</script>
</body>
</html>
